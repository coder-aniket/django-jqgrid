<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}jqGrid Demo{% endblock %}</title>
    {% load jqgrid_tags %}
    {% jqgrid_css %}
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="container mt-4">
        {% block content %}
        <h1>jqGrid Demo</h1>
        <p>Use the jqgrid_container tag to include a grid.</p>
        {% endblock %}
    </div>

    {% jqgrid_js %}
    {% block extra_js %}{% endblock %}
</body>
</html>
